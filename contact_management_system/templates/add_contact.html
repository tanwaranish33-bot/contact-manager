{% extends "base.html" %}
{# add_contact.html — Add new contact form (Task 3 — Create) #}

{% block title %}Add Contact{% endblock %}

{% block content %}
<div class="form-page">

  <div class="form-page-header">
    <a href="{{ url_for('index') }}" class="back-link">← Back to Contacts</a>
    <h1 class="page-title">Add New Contact</h1>
    <p class="page-subtitle">Fill in all fields and click Save.</p>
  </div>

  {% if error %}
    <div class="alert alert--error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('add_contact') }}" class="contact-form" novalidate>

    <div class="form-group">
      <label for="name" class="form-label">Full Name <span class="required">*</span></label>
      <input type="text" id="name" name="name" class="form-input"
             placeholder="e.g. Alice Johnson"
             value="{{ request.form.get('name', '') }}"
             maxlength="100" required autofocus />
    </div>

    <div class="form-group">
      <label for="phone" class="form-label">Phone Number <span class="required">*</span></label>
      <input type="tel" id="phone" name="phone" class="form-input"
             placeholder="e.g. 9876543210"
             value="{{ request.form.get('phone', '') }}"
             maxlength="15" required />
    </div>

    <div class="form-group">
      <label for="email" class="form-label">Email Address <span class="required">*</span></label>
      <input type="email" id="email" name="email" class="form-input"
             placeholder="e.g. alice@example.com"
             value="{{ request.form.get('email', '') }}"
             maxlength="150" required />
    </div>

    <div class="form-actions">
      <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">Save Contact →</button>
    </div>

  </form>
</div>
{% endblock %}
